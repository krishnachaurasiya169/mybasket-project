spring.application.name=jpa-app

# database configuration isse connection hoga data base se

spring.datasource.url=jdbc:mysql://localhost:3306/school
spring.datasource.username=root
spring.datasource.password=krishna277121




#jpa hibernate related configuration

# if schema is not present at the database this will create and validate schema automatically
#necessicity k hissab se table auto create hoga jb ddl-auto="update" laga hai too
spring.jpa.hibernate.ddl-auto=update

#console me sql query daga kon sa use hua hai
spring.jpa.show-sql=true

#dialect means hibernate ho bata rha h mysql lang use ho rha hai(mysqldialect use hua hai )
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.files.upload.folder.products = product/
app.files.upload.folder.users = users/

logging.level.org.springframework.security=DEBUG